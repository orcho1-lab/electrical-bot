<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בוט מכונות חשמל</title>

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Marked.js for markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>

  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --sidebar-bg: #111827;
      --chat-bg: #0b0f1a;
      --bubble-user: #2563eb;
      --bubble-bot: #1a2236;
      --border: #1e293b;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --input-bg: #111827;
      --sidebar-width: 280px;
      --glow: rgba(59, 130, 246, 0.08);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ========== LAYOUT ========== */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ========== SIDEBAR ========== */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    #sidebar-header {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h2 {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #new-chat-btn {
      width: 100%;
      padding: 9px 14px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    #new-chat-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); }

    #conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conv-date-group {
      padding: 6px 12px 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .conv-date-group:first-child { margin-top: 0; }

    .conv-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s;
    }

    .conv-item:hover { background: rgba(255,255,255,0.06); }
    .conv-item.active { background: rgba(37, 99, 235, 0.15); border-right: 3px solid var(--accent); }

    .conv-icon {
      font-size: 16px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .conv-info {
      flex: 1;
      min-width: 0;
    }

    .conv-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .conv-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .conv-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-delete:hover { color: #ef4444; }

    /* ========== MAIN CHAT ========== */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      position: relative;
    }

    /* ========== TOP BAR ========== */
    #topbar {
      padding: 0 18px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--sidebar-bg);
    }

    #menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
    }

    #topbar-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    #topbar-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ========== MESSAGES ========== */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.04) 0%, transparent 60%);
    }

    /* Welcome screen */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8vh 20px 20px;
      text-align: center;
      gap: 6px;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 8px;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
    }

    #welcome h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    #welcome p {
      color: var(--text-muted);
      font-size: 13px;
      max-width: 360px;
      line-height: 1.5;
    }

    .chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 20px;
      width: 100%;
      max-width: 480px;
    }

    .chip {
      background: rgba(17, 24, 39, 0.7);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12.5px;
      cursor: pointer;
      transition: all 0.25s;
      color: var(--text-muted);
      text-align: right;
      line-height: 1.4;
      position: relative;
      overflow: hidden;
    }

    .chip::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .chip:hover {
      background: rgba(59, 130, 246, 0.08);
      border-color: rgba(59, 130, 246, 0.3);
      color: var(--text);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1);
    }

    .chip:hover::before {
      opacity: 1;
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: var(--accent);
    }

    .message.bot .avatar {
      background: #1e3a5f;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
      max-width: calc(100% - 50px);
      direction: rtl;
      unicode-bidi: plaintext;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 18px 4px 18px 18px;
    }

    .message.bot .bubble {
      background: var(--bubble-bot);
      border-radius: 4px 18px 18px 18px;
      border: 1px solid var(--border);
    }

    /* Markdown styles inside bubbles */
    .bubble h1, .bubble h2, .bubble h3 {
      margin: 12px 0 6px;
      font-weight: 700;
    }

    .bubble h3 { font-size: 15px; color: #60a5fa; }
    .bubble h2 { font-size: 16px; }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble ul, .bubble ol {
      padding-right: 24px;
      padding-left: 0;
      margin-bottom: 8px;
    }

    .bubble li { margin-bottom: 4px; }

    .bubble strong { color: #93c5fd; }

    .bubble code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    .bubble pre {
      background: rgba(0,0,0,0.4);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    /* Tables */
    .bubble table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
      font-size: 13px;
    }

    .bubble th, .bubble td {
      border: 1px solid var(--border);
      padding: 7px 12px;
      text-align: right;
    }

    .bubble th {
      background: rgba(37, 99, 235, 0.2);
      font-weight: 600;
    }

    .bubble tr:hover td { background: rgba(255,255,255,0.03); }

    /* KaTeX - always LTR */
    .bubble .katex,
    .bubble .katex-display,
    .bubble .katex-html {
      direction: ltr;
      unicode-bidi: embed;
      text-align: left;
    }

    .bubble .katex-display {
      overflow-x: auto;
      padding: 8px 0;
      display: block;
      text-align: center !important;
    }

    /* Paragraphs and lists — RTL */
    .bubble p,
    .bubble li,
    .bubble h1, .bubble h2, .bubble h3 {
      direction: rtl;
      unicode-bidi: plaintext;
    }

    /* Code blocks — LTR */
    .bubble pre,
    .bubble code {
      direction: ltr;
      unicode-bidi: embed;
      text-align: left;
    }

    /* Tables */
    .bubble table {
      direction: rtl;
    }

    /* Correct-solution action bar */
    .bubble-actions {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .message:hover .bubble-actions { opacity: 1; }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .action-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(37, 99, 235, 0.1);
    }

    .action-btn.copied {
      color: #34d399;
      border-color: #34d399;
    }

    /* Message timestamp */
    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.2s;
      margin-top: 4px;
      text-align: right;
    }
    .message.user .msg-time { text-align: left; }
    .message:hover .msg-time { opacity: 1; }

    /* Message entrance animation */
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message { animation: msgSlideIn 0.3s ease-out; }

    /* ========== TOAST NOTIFICATIONS ========== */
    #toast-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      pointer-events: auto;
      animation: toastIn 0.3s ease-out;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 400px;
    }
    .toast.success { border-color: #22c55e; }
    .toast.success::before { content: '✓'; color: #22c55e; font-weight: 700; font-size: 16px; }
    .toast.error { border-color: #ef4444; }
    .toast.error::before { content: '✕'; color: #ef4444; font-weight: 700; font-size: 16px; }
    .toast.info { border-color: var(--accent); }
    .toast.info::before { content: 'ℹ'; color: var(--accent); font-weight: 700; font-size: 16px; }
    .toast.removing { animation: toastOut 0.3s ease-in forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-20px); } }

    /* ========== SCROLL TO BOTTOM BUTTON ========== */
    #scroll-bottom-btn {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      z-index: 50;
      transition: background 0.2s;
    }
    #scroll-bottom-btn:hover { background: var(--accent); }
    #scroll-bottom-btn.visible { display: flex; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
      align-items: center;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .cursor-blink {
      display: inline-block;
      animation: cursor-blink-anim 0.8s step-end infinite;
      color: var(--accent);
      font-weight: bold;
    }

    @keyframes cursor-blink-anim {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ========== INPUT AREA ========== */
    #input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--sidebar-bg);
    }

    /* Image preview strip */
    #image-preview-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    #image-preview-wrap.visible { display: flex; }

    #image-preview {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    #image-preview-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #image-remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    #image-remove-btn:hover { color: #ef4444; }

    #input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input-wrapper:focus-within {
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 160px;
      font-family: inherit;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #attach-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    #attach-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }
    #attach-btn.has-image { color: #34d399; }

    #send-btn {
      background: var(--accent);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    #send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; transform: none; }

    #input-hint {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
      opacity: 0.6;
    }

    /* Image inside message bubble */
    .bubble img.msg-image {
      max-width: 260px;
      max-height: 260px;
      border-radius: 8px;
      display: block;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }

    /* ========== QUESTION BANK ========== */
    #qbank-section {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #qbank-toggle-btn {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
      user-select: none;
    }

    #qbank-toggle-btn:hover { color: var(--text); }

    #qbank-count-badge {
      font-size: 10px;
      background: var(--accent);
      color: white;
      padding: 1px 6px;
      border-radius: 10px;
      margin-right: auto;
    }

    #qbank-panel { padding: 8px; }

    .qbank-actions { display: flex; gap: 6px; margin-bottom: 8px; }

    .qbank-btn {
      flex: 1;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .qbank-btn:hover { color: var(--text); border-color: var(--accent); }
    .qbank-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #qbank-list { max-height: 260px; overflow-y: auto; }

    .qbank-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .qbank-text { color: var(--text); margin-bottom: 4px; line-height: 1.4; }
    .qbank-meta { color: var(--text-muted); font-size: 10px; margin-bottom: 6px; }
    .qbank-item-actions { display: flex; gap: 6px; }

    .qbank-ask-btn {
      flex: 1;
      background: rgba(37,99,235,0.15);
      border: 1px solid rgba(37,99,235,0.3);
      color: #60a5fa;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .qbank-ask-btn:hover { background: rgba(37,99,235,0.25); }

    .qbank-del-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .qbank-del-btn:hover { color: #ef4444; border-color: #ef4444; }

    .qbank-topic-group { margin-bottom: 4px; }
    .qbank-topic-group.collapsed .qbank-topic-items { display: none; }
    .qbank-topic-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      transition: background 0.15s;
      user-select: none;
    }
    .qbank-topic-header:hover { background: rgba(37,99,235,0.15); }
    .qbank-topic-count {
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }
    .qbank-topic-items { padding: 4px 0 4px 8px; }

    .qbank-empty { color: var(--text-muted); font-size: 12px; text-align: center; padding: 12px; }

    .qbank-solution {
      display: none;
      margin-top: 8px;
      padding: 8px;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    .qbank-solution.visible { display: block; }

    .qbank-toggle-solution {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.15s;
    }

    .qbank-toggle-solution:hover { color: var(--text); }

    .extracted-panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
    }

    .extracted-title { color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }

    .extracted-item { padding: 4px 0; }
    .extracted-item label { display: flex; gap: 8px; align-items: flex-start; cursor: pointer; color: var(--text); line-height: 1.4; }
    .extracted-actions { display: flex; gap: 6px; margin-top: 10px; }

    /* Question/exercise images */
    .qbank-img, .eb-card-img {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: opacity 0.15s;
      background: rgba(255,255,255,0.03);
    }
    .qbank-img:hover, .eb-card-img:hover { opacity: 0.8; }
    .extracted-preview-img {
      width: 100%;
      max-height: 160px;
      object-fit: contain;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }

    /* Lightbox overlay */
    #lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 12px;
    }
    #lightbox-overlay.active { display: flex; }
    #lightbox-overlay img {
      max-width: 92vw;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.6);
      cursor: default;
    }
    .lightbox-actions {
      display: flex;
      gap: 10px;
    }
    .lightbox-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .lightbox-btn:hover { background: rgba(255,255,255,0.2); }

    /* Skeleton loader animation */
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.15; }
    }
    .skeleton {
      background: var(--sidebar-bg);
      border-radius: 12px;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }
    .skeleton-card { height: 160px; }
    .skeleton-conv { height: 42px; border-radius: 8px; margin-bottom: 4px; }

    /* Delete confirmation modal */
    #delete-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 9998;
      justify-content: center;
      align-items: center;
    }
    #delete-modal.active { display: flex; }
    .delete-modal-box {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      max-width: 320px;
    }
    .delete-modal-box h3 { font-size: 16px; margin-bottom: 8px; }
    .delete-modal-box p { color: var(--text-muted); font-size: 13px; margin-bottom: 18px; }
    .delete-modal-btns { display: flex; gap: 10px; justify-content: center; }
    .delete-modal-btns button {
      padding: 8px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .delete-modal-btns button:hover { opacity: 0.85; }
    .btn-cancel { background: var(--border); color: var(--text); }
    .btn-delete { background: #ef4444; color: white; }

    /* Sidebar search */
    #sidebar-search {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      margin-top: 8px;
      transition: border-color 0.2s;
    }
    #sidebar-search:focus { border-color: var(--accent); }
    #sidebar-search::placeholder { color: var(--text-muted); }

    /* ========== EXAM PICKER DIALOG ========== */
    #exam-picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 9998;
      justify-content: center;
      align-items: center;
    }
    #exam-picker-overlay.active { display: flex; }
    .exam-picker {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 90vw;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .exam-picker-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .exam-picker-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .exam-picker-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .exam-picker-close:hover { background: rgba(255,255,255,0.1); }
    .exam-picker-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }
    .exam-group-label {
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
      margin: 14px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .exam-group-label:first-child { margin-top: 4px; }
    .exam-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: background 0.15s;
      gap: 10px;
    }
    .exam-item:hover { background: rgba(37,99,235,0.12); }
    .exam-item .exam-icon { font-size: 18px; flex-shrink: 0; }
    .exam-item .exam-label { flex: 1; }
    .exam-picker-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ========== MOBILE ========== */
    @media (max-width: 640px) {
      #sidebar {
        position: fixed;
        top: 0;
        right: 0;
        height: 100%;
        transform: translateX(100%);
      }

      #sidebar.open {
        transform: translateX(0);
        box-shadow: -4px 0 20px rgba(0,0,0,0.5);
      }

      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 90;
      }

      #overlay.active { display: block; }

      #menu-btn { display: flex; }

      .message { max-width: 100%; }

      .chips { grid-template-columns: 1fr 1fr; gap: 6px; }
      .chip { padding: 10px 12px; font-size: 11.5px; }
      #welcome { padding: 5vh 14px 14px; gap: 4px; }
      .welcome-icon { width: 48px; height: 48px; font-size: 22px; border-radius: 14px; }
      #welcome h1 { font-size: 20px; }
      #input-hint { display: none; }
    }

    /* ========== TABS ========== */
    .tab-bar {
      display: flex;
      gap: 2px;
      margin-right: auto;
      margin-left: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 3px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); background: var(--accent); font-weight: 600; }

    /* ========== EXERCISE BANK PANEL ========== */
    #exercise-bank {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    #exercise-bank.visible { display: block; }

    .eb-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .eb-header h2 { font-size: 20px; font-weight: 700; }
    .eb-upload-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    .eb-upload-btn:hover { background: var(--accent-hover); }

    /* ========== STATS BAR ========== */
    .eb-stats {
      display: flex;
      gap: 16px;
      padding: 10px 0;
      font-size: 13px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .eb-stats span { font-weight: 600; color: var(--text); }

    /* ========== SEARCH BAR ========== */
    .eb-search {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .eb-search:focus { border-color: var(--accent); }
    .eb-search::placeholder { color: var(--text-muted); }

    /* ========== TOPIC FILTER BAR ========== */
    .eb-filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 12px;
      scrollbar-width: none;
    }
    .eb-filter-bar::-webkit-scrollbar { display: none; }
    .eb-filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .eb-filter-chip:hover { border-color: var(--text); color: var(--text); }
    .eb-filter-chip.active {
      color: white;
      border-color: transparent;
    }
    .eb-filter-chip .chip-count {
      font-size: 11px;
      opacity: 0.7;
    }

    /* ========== TOPIC SECTIONS ========== */
    .eb-topic-section { margin-bottom: 20px; }
    .eb-topic-title {
      font-size: 16px;
      font-weight: 700;
      padding: 10px 0 8px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .eb-topic-title:hover { opacity: 0.8; }
    .eb-topic-title .count {
      color: white;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .eb-topic-section.collapsed .eb-cards { display: none; }

    .eb-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .eb-card {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      border-right: 3px solid var(--border);
      position: relative;
    }
    .eb-card:hover { box-shadow: 0 0 16px rgba(37,99,235,0.12); }
    .eb-card-badges {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .eb-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
      white-space: nowrap;
    }
    .eb-badge-topic {
      color: white;
    }
    .eb-badge-source {
      background: rgba(255,255,255,0.08);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .eb-card-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 10px;
      max-height: 100px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }
    .eb-card-actions {
      display: flex;
      gap: 6px;
    }
    .eb-solve-btn {
      flex: 1;
      background: rgba(37,99,235,0.15);
      border: 1px solid rgba(37,99,235,0.3);
      color: #60a5fa;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    .eb-solve-btn:hover { background: rgba(37,99,235,0.25); }
    .eb-delete-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .eb-delete-btn:hover { color: #ef4444; border-color: #ef4444; }

    /* Solution toggle */
    .eb-solution-toggle {
      width: 100%;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: #4ade80;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
      font-family: inherit;
    }
    .eb-solution-toggle:hover { background: rgba(34,197,94,0.2); }
    .eb-solution-wrap {
      display: none;
      margin-top: 8px;
      padding: 12px;
      background: rgba(15,23,42,0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      max-height: 400px;
      overflow-y: auto;
      direction: rtl;
    }
    .eb-solution-wrap.open { display: block; }
    .eb-solution-wrap table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 12px;
    }
    .eb-solution-wrap th, .eb-solution-wrap td {
      border: 1px solid var(--border);
      padding: 4px 8px;
      text-align: center;
    }
    .eb-solution-wrap th { background: rgba(37,99,235,0.1); }

    /* Edit modal */
    .eb-edit-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.7); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .eb-edit-modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; width: 95%; max-width: 600px;
      max-height: 85vh; overflow-y: auto; direction: rtl;
    }
    .eb-edit-modal h3 { margin: 0 0 14px; color: var(--text); font-size: 16px; }
    .eb-edit-modal label { display: block; color: var(--text-muted); font-size: 12px; margin: 10px 0 4px; font-weight: 600; }
    .eb-edit-modal textarea, .eb-edit-modal select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; color: var(--text);
      font-size: 13px; font-family: inherit; resize: vertical;
    }
    .eb-edit-modal textarea:focus, .eb-edit-modal select:focus { outline: none; border-color: var(--accent); }
    .eb-edit-modal .eb-edit-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-start; }
    .eb-edit-modal .eb-edit-save {
      background: var(--accent); color: #fff; border: none;
      padding: 8px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600;
    }
    .eb-edit-modal .eb-edit-cancel {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 8px 20px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .eb-edit-btn {
      background: none; border: 1px solid rgba(251,191,36,0.3);
      color: #fbbf24; padding: 6px 10px; border-radius: 6px;
      font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .eb-edit-btn:hover { background: rgba(251,191,36,0.15); border-color: #fbbf24; }

    /* Difficulty badges */
    .eb-diff { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
    .eb-diff-1 { background: rgba(34,197,94,0.2); color: #4ade80; }
    .eb-diff-2 { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .eb-diff-3 { background: rgba(239,68,68,0.2); color: #f87171; }

    /* Difficulty filter pills */
    .eb-diff-filters { display: flex; gap: 6px; margin: 8px 0 4px; flex-wrap: wrap; }
    .eb-diff-pill {
      padding: 4px 12px; border-radius: 16px; font-size: 11px;
      cursor: pointer; border: 1px solid var(--border); color: var(--text-muted);
      background: none; transition: all 0.15s; font-weight: 600;
    }
    .eb-diff-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(37,99,235,0.1); }
    .eb-diff-pill:hover { border-color: var(--accent); }

    /* Drag & drop */
    .eb-card[draggable="true"] { cursor: grab; }
    .eb-card.dragging { opacity: 0.4; transform: scale(0.97); }
    .eb-card.drag-over { border-top: 2px solid var(--accent); }
    .eb-topic-section.drag-target { outline: 2px dashed var(--accent); outline-offset: -2px; border-radius: 8px; }

    /* Save-to-bank button in chat */
    .save-to-bank-btn {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80; padding: 4px 10px; border-radius: 6px;
      font-size: 11px; cursor: pointer; font-weight: 600; transition: all 0.15s;
    }
    .save-to-bank-btn:hover { background: rgba(34,197,94,0.2); }
    .save-to-bank-btn.saved { color: #86efac; pointer-events: none; opacity: 0.7; }

    .eb-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .eb-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .eb-empty p { font-size: 14px; margin-bottom: 16px; }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>
<div id="lightbox-overlay" onclick="if(event.target===this)this.classList.remove('active')">
  <img id="lightbox-img" src="" />
  <div class="lightbox-actions">
    <button class="lightbox-btn" onclick="downloadLightboxImg()">💾 הורד תמונה</button>
    <button class="lightbox-btn" onclick="document.getElementById('lightbox-overlay').classList.remove('active')">✕ סגור</button>
  </div>
</div>
<div id="delete-modal" onclick="if(event.target===this)closeDeleteModal()">
  <div class="delete-modal-box">
    <h3>🗑️ מחיקת שיחה</h3>
    <p>השיחה תימחק לצמיתות. להמשיך?</p>
    <div class="delete-modal-btns">
      <button class="btn-cancel" onclick="closeDeleteModal()">ביטול</button>
      <button class="btn-delete" id="confirm-delete-btn">מחק</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<!-- Exam Picker Dialog -->
<div id="exam-picker-overlay" onclick="if(event.target===this)closeExamPicker()">
  <div class="exam-picker">
    <div class="exam-picker-header">
      <h3>בחר מבחן לחילוץ שאלות</h3>
      <button class="exam-picker-close" onclick="closeExamPicker()">&times;</button>
    </div>
    <div class="exam-picker-body" id="exam-picker-list">
      <div style="text-align:center;padding:30px;color:var(--text-muted)">טוען מבחנים...</div>
    </div>
    <div class="exam-picker-footer">לחץ על מבחן כדי לחלץ ממנו שאלות</div>
  </div>
</div>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>⚡ היסטוריית שיחות</h2>
      <button id="new-chat-btn" onclick="newChat()">
        <span>+</span> שיחה חדשה
      </button>
      <input type="text" id="sidebar-search" placeholder="🔍 חיפוש שיחות..." oninput="filterConversations(this.value)" />
    </div>
    <div id="conversations-list"></div>

    <!-- Question Bank -->
    <div id="qbank-section">
      <div id="qbank-toggle-btn" onclick="toggleQBank()">
        📚 מאגר שאלות
        <span id="qbank-count-badge" style="display:none"></span>
      </div>
      <div id="qbank-panel" style="display:none">
        <div class="qbank-actions">
          <button class="qbank-btn" id="btn-extract-exams" onclick="openExamPicker()">📄 חלץ ממבחנים</button>
          <input type="file" id="qbank-file" accept="image/*" style="display:none" onchange="extractFromImageFile(event)">
          <button class="qbank-btn" onclick="document.getElementById('qbank-file').click()">📎 חלץ מתמונה</button>
        </div>
        <div id="qbank-list"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <div id="topbar-info">
        <div id="topbar-title">⚡ מכונות חשמל</div>
        <div id="topbar-subtitle">Gemini Pro</div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('chat')" id="tab-chat">💬 צ'אט</button>
        <button class="tab-btn" onclick="switchTab('exercises')" id="tab-exercises">📚 תרגילים</button>
      </div>
    </div>

    <div id="messages">
      <div id="welcome"></div>
    </div>

    <!-- EXERCISE BANK TAB -->
    <div id="exercise-bank">
      <div class="eb-header">
        <h2>📚 מאגר תרגילים</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input type="file" id="eb-upload-input" accept="image/*" style="display:none" onchange="ebUploadImage(event)" />
          <button id="eb-upload-btn-main" class="eb-upload-btn" onclick="document.getElementById('eb-upload-input').click()">📎 חלץ מתמונה</button>
          <button class="eb-upload-btn" onclick="openExamPicker()" style="background:rgba(37,99,235,0.15);color:#60a5fa;border:1px solid rgba(37,99,235,0.3)">📄 חלץ ממבחנים</button>
          <button id="eb-batch-btn" class="eb-upload-btn" onclick="batchProcessQuestions()" style="background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.3)">🧠 פתור הכל</button>
        </div>
      </div>
      <div id="eb-stats" class="eb-stats"></div>
      <input type="text" class="eb-search" id="eb-search" placeholder="חפש שאלה..." oninput="filterExercises()" />
      <div id="eb-filter-bar" class="eb-filter-bar"></div>
      <div id="eb-content"></div>
    </div>

    <button id="scroll-bottom-btn" onclick="scrollToBottom()">↓</button>

    <div id="input-area">
      <!-- Hidden file input — no capture attr so user can pick gallery OR camera -->
      <input type="file" id="image-input" accept="image/*" style="display:none" onchange="onImageSelected(event)" />
      <!-- Hidden file input for correct solution upload -->
      <input type="file" id="correct-solution-input" accept="image/*" style="display:none" onchange="onCorrectSolutionSelected(event)" />

      <!-- Image preview strip (shown when image is attached) -->
      <div id="image-preview-wrap">
        <img id="image-preview" src="" alt="תצוגה מקדימה" />
        <span id="image-preview-name"></span>
        <button id="image-remove-btn" onclick="removeImage()" title="הסר תמונה">✕</button>
      </div>

      <div id="input-wrapper">
        <button id="attach-btn" onclick="document.getElementById('image-input').click()" title="צרף תמונה">📎</button>
        <textarea
          id="user-input"
          rows="1"
          placeholder="שאל שאלה על מכונות חשמל..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" title="שלח">➤</button>
      </div>
      <div id="input-hint">Enter לשליחה · Shift+Enter לשורה חדשה · 📎 לצרף תמונה</div>
    </div>
  </div>

</div>

<script>
  // ========== STATE ==========
  let currentConvId = null;
  let isLoading = false;
  let pendingImage = null;  // { base64: string, mimeType: string, dataUrl: string, name: string }

  // ========== INIT ==========
  document.addEventListener('DOMContentLoaded', () => {
    showWelcome();
    loadConversations();
    document.getElementById('user-input').focus();
  });

  // ========== TAB SWITCHING ==========
  function switchTab(tab) {
    const chatElements = [document.getElementById('messages'), document.getElementById('input-area')];
    const ebPanel = document.getElementById('exercise-bank');
    const tabChat = document.getElementById('tab-chat');
    const tabExercises = document.getElementById('tab-exercises');

    if (tab === 'exercises') {
      chatElements.forEach(el => el.style.display = 'none');
      ebPanel.classList.add('visible');
      tabChat.classList.remove('active');
      tabExercises.classList.add('active');
      loadExerciseBank();
    } else {
      chatElements.forEach(el => el.style.display = '');
      ebPanel.classList.remove('visible');
      tabChat.classList.add('active');
      tabExercises.classList.remove('active');
    }
  }

  async function loadExerciseBank() {
    // Show skeleton while loading
    const container = document.getElementById('exercise-bank');
    if (container && !container.querySelector('.eb-header')) {
      container.innerHTML = `<div style="padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
        ${Array(6).fill('<div class="skeleton skeleton-card"></div>').join('')}
      </div>`;
    }
    try {
      const res = await fetch('/api/questions');
      const questions = await res.json();
      window._lastQuestions = questions;
      renderExerciseBank(questions);
    } catch (e) {
      console.error('Failed to load exercise bank', e);
    }
  }

  // ========== TOPIC COLOR SYSTEM ==========
  // Keywords matched with .includes() — order matters (first match wins)
  const TOPIC_RULES = [
    { keys: ['שנאי','שנאים','Transformer','transformer','Parallel Transformer'], cfg: { icon: '🔌', color: '#a855f7', label: 'שנאים' } },
    { keys: ['אסינכרוני','השראה','Induction','induction'], cfg: { icon: '⚙️', color: '#22c55e', label: 'מנוע אסינכרוני' } },
    { keys: ['סינכרוני','Synchronous','synchronous'], cfg: { icon: '🔄', color: '#f59e0b', label: 'סינכרוני' } },
    { keys: ['DC','dc'], cfg: { icon: '🔋', color: '#ef4444', label: 'DC' } },
    { keys: ['הינע','VFD','vfd','וסת מהירות','Chopper','chopper','Drive','drive'], cfg: { icon: '🏭', color: '#3b82f6', label: 'הינע חשמלי' } },
    { keys: ['מקדם','הספק','Power Factor','power factor'], cfg: { icon: '⚡', color: '#06b6d4', label: 'מקדם הספק' } },
    { keys: ['כבל','הגנה','העמסה','Cable','cable','Protection'], cfg: { icon: '🛡️', color: '#ec4899', label: 'כבלים והגנה' } },
    { keys: ['רשת','מעגל','רדיאלי','Circuit','circuit','Network','תמורה'], cfg: { icon: '🔗', color: '#14b8a6', label: 'מעגלים ורשתות' } },
  ];
  const DEFAULT_TOPIC = { icon: '📋', color: '#6b7280', label: 'כללי' };

  function getTopicConfig(topic) {
    for (const rule of TOPIC_RULES) {
      for (const key of rule.keys) {
        if (topic.includes(key)) return rule.cfg;
      }
    }
    return DEFAULT_TOPIC;
  }

  // Store questions globally for filtering
  let _allQuestions = [];
  let _activeFilter = 'all';
  let _activeDifficulty = 0; // 0=all, 1=easy, 2=medium, 3=hard

  function renderExerciseBank(questions) {
    _allQuestions = questions;
    _activeFilter = 'all';
    document.getElementById('eb-search').value = '';
    renderFilterBar(questions);
    renderStats(questions);
    renderCards(questions);
  }

  function renderStats(questions) {
    const statsEl = document.getElementById('eb-stats');
    if (!questions.length) { statsEl.innerHTML = ''; return; }
    const topics = new Set(questions.map(q => getTopicConfig(q.topic || 'כללי').label));
    const withSolution = questions.filter(q => q.solution).length;
    const solvedPct = Math.round(withSolution / questions.length * 100);

    const dCounts = { 1: 0, 2: 0, 3: 0 };
    questions.forEach(q => { if (q.difficulty) dCounts[q.difficulty]++; });

    statsEl.innerHTML = `
      <div><span>${questions.length}</span> שאלות &nbsp;|&nbsp; <span>${topics.size}</span> נושאים &nbsp;|&nbsp; <span style="color:#4ade80">${withSolution}</span> פתורות (${solvedPct}%)</div>
      <div class="eb-diff-filters">
        <button class="eb-diff-pill ${_activeDifficulty===0?'active':''}" onclick="setDifficulty(0)">הכל</button>
        <button class="eb-diff-pill ${_activeDifficulty===1?'active':''}" onclick="setDifficulty(1)">🟢 קל (${dCounts[1]})</button>
        <button class="eb-diff-pill ${_activeDifficulty===2?'active':''}" onclick="setDifficulty(2)">🟡 בינוני (${dCounts[2]})</button>
        <button class="eb-diff-pill ${_activeDifficulty===3?'active':''}" onclick="setDifficulty(3)">🔴 קשה (${dCounts[3]})</button>
      </div>
    `;
  }

  function setDifficulty(d) {
    _activeDifficulty = d;
    filterExercises();
    renderStats(_allQuestions);
  }

  function renderFilterBar(questions) {
    const bar = document.getElementById('eb-filter-bar');
    if (!questions.length) { bar.innerHTML = ''; return; }

    // Count per normalized topic
    const counts = {};
    questions.forEach(q => {
      const cfg = getTopicConfig(q.topic || 'כללי');
      counts[cfg.label] = (counts[cfg.label] || 0) + 1;
    });

    // Build unique topics preserving order
    const seen = new Set();
    const topicList = [];
    questions.forEach(q => {
      const cfg = getTopicConfig(q.topic || 'כללי');
      if (!seen.has(cfg.label)) {
        seen.add(cfg.label);
        topicList.push(cfg);
      }
    });

    let html = `<button class="eb-filter-chip active" style="background:var(--accent)" onclick="setFilter('all')">הכל <span class="chip-count">${questions.length}</span></button>`;
    topicList.forEach(cfg => {
      html += `<button class="eb-filter-chip" data-topic="${cfg.label}" onclick="setFilter('${cfg.label}')" style="--chip-color:${cfg.color}">
        ${cfg.icon} ${cfg.label} <span class="chip-count">${counts[cfg.label]}</span>
      </button>`;
    });
    bar.innerHTML = html;
  }

  function setFilter(topic) {
    _activeFilter = topic;
    // Update active chip
    document.querySelectorAll('.eb-filter-chip').forEach(chip => {
      chip.classList.remove('active');
      chip.style.background = '';
      chip.style.borderColor = '';
      chip.style.color = '';
    });
    if (topic === 'all') {
      const allChip = document.querySelector('.eb-filter-chip');
      allChip.classList.add('active');
      allChip.style.background = 'var(--accent)';
    } else {
      document.querySelectorAll('.eb-filter-chip[data-topic]').forEach(chip => {
        if (chip.dataset.topic === topic) {
          chip.classList.add('active');
          const cfg = TOPIC_RULES.map(r=>r.cfg).find(c=>c.label===topic) || DEFAULT_TOPIC;
          chip.style.background = cfg.color;
          chip.style.borderColor = cfg.color;
          chip.style.color = 'white';
        }
      });
    }
    filterExercises();
  }

  function filterExercises() {
    const search = (document.getElementById('eb-search').value || '').trim().toLowerCase();
    let filtered = _allQuestions;
    if (_activeFilter !== 'all') {
      filtered = filtered.filter(q => getTopicConfig(q.topic || 'כללי').label === _activeFilter);
    }
    if (_activeDifficulty > 0) {
      filtered = filtered.filter(q => q.difficulty === _activeDifficulty);
    }
    if (search) {
      filtered = filtered.filter(q => (q.text || '').toLowerCase().includes(search) || (q.topic || '').toLowerCase().includes(search));
    }
    renderCards(filtered);
  }

  function renderCards(questions) {
    const container = document.getElementById('eb-content');

    if (!questions.length) {
      const isFiltered = _activeFilter !== 'all' || (document.getElementById('eb-search').value || '').trim();
      container.innerHTML = `
        <div class="eb-empty">
          <div class="eb-empty-icon">${isFiltered ? '🔍' : '📚'}</div>
          <p>${isFiltered ? 'לא נמצאו שאלות מתאימות.' : 'אין תרגילים עדיין.<br>העלה תמונה של דף תרגילים או מבחן והבוט יחלץ את השאלות אוטומטית.'}</p>
          ${isFiltered ? '' : '<button class="eb-upload-btn" onclick="document.getElementById(\'eb-upload-input\').click()">📎 העלה תמונה</button>'}
        </div>`;
      return;
    }

    // Group by normalized topic
    const groups = {};
    questions.forEach(q => {
      const cfg = getTopicConfig(q.topic || 'כללי');
      const key = cfg.label;
      if (!groups[key]) groups[key] = { cfg, items: [] };
      groups[key].items.push(q);
    });

    container.innerHTML = Object.entries(groups).map(([topic, { cfg, items }]) => `
      <div class="eb-topic-section" data-topic="${cfg.label}"
           ondragover="event.preventDefault(); this.classList.add('drag-target')"
           ondragleave="this.classList.remove('drag-target')"
           ondrop="dropOnTopic(event, this)">
        <div class="eb-topic-title" onclick="this.parentElement.classList.toggle('collapsed')" style="border-bottom-color:${cfg.color};color:${cfg.color}">
          ${cfg.icon} ${escapeHtml(topic)}
          <span class="count" style="background:${cfg.color}">${items.length}</span>
        </div>
        <div class="eb-cards">
          ${items.map(q => {
            const qCfg = getTopicConfig(q.topic || 'כללי');
            const diffLabel = q.difficulty === 3 ? '🔴 קשה' : q.difficulty === 2 ? '🟡 בינוני' : q.difficulty === 1 ? '🟢 קל' : '';
            const diffClass = q.difficulty ? `eb-diff eb-diff-${q.difficulty}` : '';
            return `
            <div class="eb-card" data-qid="${q.id}" draggable="true"
                 ondragstart="dragCard(event, ${q.id})"
                 ondragend="this.classList.remove('dragging')"
                 style="border-right-color:${qCfg.color}" onmouseenter="this.style.boxShadow='0 0 16px ${qCfg.color}22'" onmouseleave="this.style.boxShadow=''">
              <div class="eb-card-badges">
                <span class="eb-badge eb-badge-topic" style="background:${qCfg.color}">${qCfg.icon} ${escapeHtml(q.topic || 'כללי')}</span>
                ${diffLabel ? `<span class="${diffClass}">${diffLabel}</span>` : ''}
                ${q.source ? `<span class="eb-badge eb-badge-source">${escapeHtml(q.source)}</span>` : ''}
              </div>
              ${q.image_url ? `<img class="eb-card-img" src="${q.image_url}" onclick="openLightbox('${q.image_url}')" alt="תמונת שאלה" />` : ''}
              <div class="eb-card-text">${escapeHtml(q.text)}</div>
              <div class="eb-card-actions">
                ${q.solution
                  ? `<button class="eb-solve-btn" style="background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#4ade80" onclick="toggleEbSolution(this.parentElement.nextElementSibling)">📖 הצג פתרון</button>`
                  : `<button class="eb-solve-btn" onclick="solveExercise('${encodeURIComponent(q.text)}', '${q.image_url || ''}')">⚡ פתור בצ'אט</button>`
                }
                <button class="eb-edit-btn" onclick="openEditModal(${q.id})">✏️ ערוך</button>
                <button class="eb-delete-btn" onclick="deleteExerciseAndRefresh(${q.id})">✕ מחק</button>
              </div>
              ${q.solution ? `
              <div class="eb-solution-wrap" data-qid="${q.id}">${q.solution}</div>
              ` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>
    `).join('');
  }

  async function solveExercise(encodedText, imageUrl) {
    const text = decodeURIComponent(encodedText);
    switchTab('chat');
    newChat();

    // If exercise has an image (circuit diagram), attach it
    if (imageUrl) {
      try {
        const resp = await fetch(imageUrl);
        const blob = await resp.blob();
        const reader = new FileReader();
        reader.onload = (e) => {
          const dataUrl = e.target.result;
          const [header, base64] = dataUrl.split(',');
          const mimeType = header.match(/:(.*?);/)[1];
          pendingImage = { base64, mimeType, dataUrl, name: 'circuit-diagram.png' };
          document.getElementById('image-preview').src = dataUrl;
          document.getElementById('image-preview-name').textContent = 'סרטוט מעגל';
          document.getElementById('image-preview-wrap').classList.add('visible');
          document.getElementById('attach-btn').classList.add('has-image');
          document.getElementById('user-input').value = text;
          autoResize(document.getElementById('user-input'));
          sendMessage();
        };
        reader.readAsDataURL(blob);
      } catch {
        // Fallback: send without image
        document.getElementById('user-input').value = text;
        autoResize(document.getElementById('user-input'));
        sendMessage();
      }
    } else {
      document.getElementById('user-input').value = text;
      document.getElementById('user-input').focus();
      autoResize(document.getElementById('user-input'));
      sendMessage();
    }
  }

  async function deleteExerciseAndRefresh(id) {
    await fetch(`/api/questions/${id}`, { method: 'DELETE' });
    loadExerciseBank();
    loadQBank();
  }

  async function batchProcessQuestions() {
    const btn = document.getElementById('eb-batch-btn');
    const oldText = btn.textContent;
    btn.disabled = true;

    // Step 1: Deduplicate
    btn.textContent = '🧹 מנקה כפילויות...';
    try {
      const dedupRes = await fetch('/api/questions/deduplicate', { method: 'POST' });
      const dedupData = await dedupRes.json();
      if (dedupData.removed > 0) {
        showToast(`🧹 הוסרו ${dedupData.removed} כפילויות. נשארו ${dedupData.remaining} שאלות.`, 'success');
        loadExerciseBank();
      }
    } catch (e) {
      showToast('שגיאה בניקוי: ' + e.message, 'error');
    }

    // Step 2: Batch solve via SSE stream
    btn.textContent = '🧠 מתחיל לפתור...';
    try {
      const response = await fetch('/api/questions/batch-solve', { method: 'POST' });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.status === 'solving') {
              btn.textContent = `🧠 פותר ${data.current}/${data.total}...`;
            } else if (data.status === 'progress' && data.current % 5 === 0) {
              loadExerciseBank();
            } else if (data.done) {
              if (data.solved > 0) {
                showToast(`🧠 נפתרו ${data.solved} שאלות! סה״כ ${data.total} במאגר.`, 'success');
              } else {
                showToast(data.message || 'הכל כבר פתור!', 'info');
              }
            }
          } catch {}
        }
      }
      loadExerciseBank();
      loadQBank();
    } catch (e) {
      showToast('שגיאה בפתרון: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = oldText;
    }
  }

  function toggleEbSolution(el) {
    // el can be a button (with nextElementSibling being the wrap) or the wrap itself
    const wrap = el.classList.contains('eb-solution-wrap') ? el : el.nextElementSibling;
    if (!wrap || !wrap.classList.contains('eb-solution-wrap')) return;

    const isOpen = wrap.classList.toggle('open');

    // Find the toggle button in the card to update its text
    const card = wrap.closest('.eb-card');
    const btn = card?.querySelector('.eb-solve-btn, .eb-solution-toggle');
    if (btn) {
      btn.textContent = isOpen ? '📖 הסתר פתרון' : '📖 הצג פתרון';
    }

    // Render markdown + math on first open
    if (isOpen && !wrap.dataset.rendered) {
      wrap.innerHTML = renderMarkdown(wrap.textContent);
      renderMath(wrap);
      wrap.dataset.rendered = '1';
    }
  }

  // ---- Edit Modal ----
  let _editQid = null;

  function openEditModal(qid) {
    const questions = window._lastQuestions || [];
    const q = questions.find(x => x.id === qid);
    if (!q) return;
    _editQid = qid;

    const topics = ['שנאים','מנוע אסינכרוני','גנרטור סינכרוני','מנוע סינכרוני','מנוע DC','גנרטור DC','הנעה חשמלית','כללי'];
    const topicOptions = topics.map(t =>
      `<option value="${t}" ${t === q.topic ? 'selected' : ''}>${t}</option>`
    ).join('');

    const overlay = document.createElement('div');
    overlay.className = 'eb-edit-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="eb-edit-modal">
        <h3>✏️ עריכת תרגיל #${qid}</h3>
        <label>נושא</label>
        <select id="edit-topic">${topicOptions}</select>
        <label>טקסט השאלה</label>
        <textarea id="edit-text" rows="5" dir="auto">${escapeHtml(q.text)}</textarea>
        <label>פתרון</label>
        <textarea id="edit-solution" rows="8" dir="auto">${escapeHtml(q.solution || '')}</textarea>
        <div class="eb-edit-actions">
          <button class="eb-edit-save" onclick="saveEditModal()">💾 שמור</button>
          <button class="eb-edit-cancel" onclick="this.closest('.eb-edit-overlay').remove()">ביטול</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
  }

  async function saveEditModal() {
    if (!_editQid) return;
    const overlay = document.querySelector('.eb-edit-overlay');
    const btn = overlay.querySelector('.eb-edit-save');
    btn.disabled = true;
    btn.textContent = '⏳ שומר...';

    const updates = {
      topic: document.getElementById('edit-topic').value,
      text: document.getElementById('edit-text').value.trim(),
      solution: document.getElementById('edit-solution').value.trim(),
    };

    try {
      const res = await fetch(`/api/questions/${_editQid}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updates)
      });
      if (!res.ok) throw new Error('Server error');
      overlay.remove();
      showToast('✅ התרגיל עודכן');
      await loadExerciseBank();
    } catch (e) {
      btn.textContent = '❌ שגיאה';
      setTimeout(() => { btn.disabled = false; btn.textContent = '💾 שמור'; }, 2000);
    }
  }

  // ---- Save chat answer to bank ----
  async function saveChatToBank(btn) {
    const bubble = btn.closest('.bubble');
    const solution = bubble.innerText.replace(/📋 העתק|📄 פתרון נכון|💾 שמור לבנק|✓ נשמר!/g, '').trim();

    // Find the user message before this bot message
    const msgEl = bubble.closest('.message');
    const allMsgs = Array.from(document.querySelectorAll('#messages .message'));
    const idx = allMsgs.indexOf(msgEl);

  function getConvIcon(title) {
    const t = (title || '').toLowerCase();
    if (t.includes('שנאי') || t.includes('transformer')) return '🔌';
    if (t.includes('אסינכרוני') || t.includes('השראה') || t.includes('induction')) return '⚙️';
    if (t.includes('סינכרוני') || t.includes('synchronous')) return '🔄';
    if (t.includes('dc') || t.includes('DC')) return '🔋';
    if (t.includes('הינע') || t.includes('vfd') || t.includes('chopper')) return '🏭';
    if (t.includes('כבל') || t.includes('הגנה') || t.includes('העמס')) return '🛡️';
    if (t.includes('מקדם') || t.includes('הספק')) return '⚡';
    if (t.includes('תמונה') || t.includes('image')) return '🖼️';
    return '💬';
  }

  function getDateGroup(dateStr) {
    if (!dateStr) return 'ישן';
    const d = new Date(dateStr);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const weekAgo = new Date(today); weekAgo.setDate(today.getDate() - 7);

    if (d >= today) return 'היום';
    if (d >= yesterday) return 'אתמול';
    if (d >= weekAgo) return 'השבוע';
    return 'ישן יותר';
  }

  function formatTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  }

  function renderConversations(convs) {
    const list = document.getElementById('conversations-list');
    list.innerHTML = '';

    if (convs.length === 0) {
      list.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:13px;text-align:center">אין שיחות עדיין</div>';
      return;
    }

    // Group by date
    const groups = {};
    const groupOrder = ['היום', 'אתמול', 'השבוע', 'ישן יותר'];
    convs.forEach(conv => {
      const group = getDateGroup(conv.updated_at);
      if (!groups[group]) groups[group] = [];
      groups[group].push(conv);
    });

    groupOrder.forEach(groupName => {
      const items = groups[groupName];
      if (!items || !items.length) return;

      const header = document.createElement('div');
      header.className = 'conv-date-group';
      header.textContent = groupName;
      list.appendChild(header);

      items.forEach(conv => {
        const item = document.createElement('div');
        item.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
        item.dataset.id = conv.id;
        const icon = getConvIcon(conv.title);
        const time = formatTime(conv.updated_at);
        item.innerHTML = `
          <span class="conv-icon">${icon}</span>
          <div class="conv-info">
            <div class="conv-title" title="${escapeHtml(conv.title)}">${escapeHtml(conv.title)}</div>
            <div class="conv-time">${time}</div>
          </div>
          <button class="conv-delete" onclick="deleteConv(event, '${conv.id}')" title="מחק">✕</button>
        `;
        item.addEventListener('click', () => loadConversation(conv.id));
        list.appendChild(item);
      });
    });
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if ((!text && !pendingImage) || isLoading) return;

    // Clear welcome
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    // Show user message (with image thumbnail if attached)
    appendMessage('user', text, pendingImage ? pendingImage.dataUrl : null);
    input.value = '';
    input.style.height = 'auto';

    // Capture and clear pending image
    const imageToSend = pendingImage;
    removeImage();

    // Create streaming bot bubble
    const botBubble = createStreamingBubble();

    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const body = {
        message: text,
        conversation_id: currentConvId
      };
      if (imageToSend) {
        body.image_data = imageToSend.base64;
        body.image_mime_type = imageToSend.mimeType;
      }

      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({ detail: 'Server error' }));
        throw new Error(errData.detail || 'Server error');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          let parsed;
          try { parsed = JSON.parse(part.slice(6)); } catch { continue; }

          if (parsed.conversation_id) {
            const isNew = !currentConvId;
            currentConvId = parsed.conversation_id;
            if (isNew) loadConversations();
          }
          if (parsed.chunk) {
            fullText += parsed.chunk;
            updateStreamingBubble(botBubble, fullText);
          }
          if (parsed.error) {
            finalizeStreamingBubble(botBubble, `❌ שגיאה: ${parsed.error}`, true);
          }
          if (parsed.done) {
            finalizeStreamingBubble(botBubble, fullText);
          }
        }
      }

    } catch (e) {
      finalizeStreamingBubble(botBubble, `❌ שגיאה: ${e.message}`, true);
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function createStreamingBubble() {
    const messagesEl = document.getElementById('messages');
    const msgEl = document.createElement('div');
    msgEl.className = 'message bot';
    msgEl.innerHTML = `

    clearTimeout(_mathRenderTimer);
    _mathRenderTimer = setTimeout(() => renderMath(bubble), 300);
    scrollToBottom();

  function finalizeStreamingBubble(bubble, text, isError = false) {
    if (isError) {
      bubble.innerHTML = escapeHtml(text);

      addBubbleActions(bubble);

  // ========== SIDEBAR SEARCH ==========
  function filterConversations(query) {
    const items = document.querySelectorAll('.conv-item');
    const groups = document.querySelectorAll('.conv-date-group');
    const q = query.trim().toLowerCase();
    if (!q) {
      items.forEach(el => el.style.display = '');
      groups.forEach(el => el.style.display = '');
      return;
    }
    items.forEach(el => {
      const title = el.querySelector('.conv-title')?.textContent.toLowerCase() || '';
      el.style.display = title.includes(q) ? '' : 'none';
    });
    // Hide empty groups
    groups.forEach(g => {
      let next = g.nextElementSibling;
      let hasVisible = false;
      while (next && !next.classList.contains('conv-date-group')) {
        if (next.style.display !== 'none') hasVisible = true;
        next = next.nextElementSibling;
      }
      g.style.display = hasVisible ? '' : 'none';
    });
  }

  // ========== RENDERING ==========
  function renderMarkdown(text) {
    // Configure marked
    marked.setOptions({
      breaks: true,
      gfm: true
    });
    return marked.parse(text);
  }

  function renderMath(element) {
    if (typeof renderMathInElement !== 'undefined') {
      renderMathInElement(element, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\[', right: '\\]', display: true },
          { left: '\\(', right: '\\)', display: false }
        ],
        throwOnError: false
      });
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadQBank() {
